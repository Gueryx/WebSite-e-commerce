<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <title>Casque sans fil - eShop</title>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <span class="logo">eShop</span>
            <span class="tagline">Mode, maison et gadgets</span>
        </div>
        <div class="header-actions">
            <a href="index.html" class="cart-link">Retour à la boutique</a>
        </div>
    </header>

    <main class="product-page">
        <div class="product-detail-card">
            <img src="image_produit/casque.png" alt="Casque sans fil">
            <div>
                <h1>Casque sans fil</h1>
                <p>Profitez d’un son clair et d’une autonomie maximale pour vos déplacements.</p>
                <div class="product-price">280,00 €</div>
                <button class="add-to-cart" data-name="Casque sans fil" data-price="280.00">Ajouter au panier</button>
            </div>
        </div>
    </main>

    <script src="product-page.js"></script>
</body>
</html>
