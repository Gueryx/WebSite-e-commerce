<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Se connecter - eShop</title>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <a href="index.html" class="logo">eShop</a>
            <span class="tagline">Mode, maison et gadgets</span>
        </div>
    </header>

    <main>
        <section class="auth-page">
            <h1>Se connecter</h1>
            <form id="loginForm" class="auth-form" action="#" novalidate>
                <div class="form-field">
                    <label for="email">Adresse e‑mail</label>
                    <input id="email" name="email" type="email" required>
                </div>
                <div class="form-field">
                    <label for="password">Mot de passe</label>
                    <input id="password" name="password" type="password" required minlength="6">
                </div>
                <button type="submit" class="submit-btn">Se connecter</button>
                <a class="aux-link" href="register.html">Pas de compte ? Créer un compte</a>
            </form>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
