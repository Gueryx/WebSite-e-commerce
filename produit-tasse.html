<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <title>Tasse thermos - eShop</title>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <span class="logo">eShop</span>
            <span class="tagline">Mode, maison et gadgets</span>
        </div>
        <div class="header-actions">
            <a href="index.html" class="cart-link">Retour à la boutique</a>
        </div>
    </header>

    <main class="product-page">
        <div class="product-detail-card">
            <img src="image_produit/tasse.png" alt="Tasse thermos">
            <div>
                <h1>Tasse thermos</h1>
                <p>Conservez votre boisson chaude ou froide toute la journée avec cet accessoire pratique.</p>
                <div class="product-price">24,50 €</div>
                <button class="add-to-cart" data-name="Tasse thermos" data-price="24.50">Ajouter au panier</button>
            </div>
        </div>
    </main>

    <script src="product-page.js"></script>
</body>
</html>
