<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Créer un compte - eShop</title>
</head>
<body>
    <header class="site-header">
        <div class="brand">
            <a href="index.html" class="logo">eShop</a>
            <span class="tagline">Mode, maison et gadgets</span>
        </div>
    </header>

    <main>
        <section class="auth-page">
            <h1>Créer un compte</h1>
            <form id="registerForm" class="auth-form" action="#" novalidate>
                <div class="form-field">
                    <label for="fullname">Nom complet</label>
                    <input id="fullname" name="fullname" type="text" required>
                </div>
                <div class="form-field">
                    <label for="regEmail">Adresse e‑mail</label>
                    <input id="regEmail" name="email" type="email" required>
                </div>
                <div class="form-field">
                    <label for="regPassword">Mot de passe</label>
                    <input id="regPassword" name="password" type="password" required minlength="6">
                </div>
                <div class="form-field">
                    <label for="regPasswordConfirm">Confirmer le mot de passe</label>
                    <input id="regPasswordConfirm" name="passwordConfirm" type="password" required minlength="6">
                </div>
                <button type="submit" class="submit-btn">Créer mon compte</button>
                <a class="aux-link" href="login.html">Déjà inscrit ? Se connecter</a>
            </form>
        </section>
    </main>

    <script src="auth.js"></script>
</body>
</html>
